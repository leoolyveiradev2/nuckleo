<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Closet da Jacy</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>

<body>

  <!-- LEFT -->
  <div class="left">

    <svg class="topo" viewBox="0 0 700 900">
      <g fill="none" stroke="white" stroke-width="1.3">
        <ellipse cx="350" cy="450" rx="310" ry="380" />
        <ellipse cx="350" cy="450" rx="255" ry="310" />
        <ellipse cx="350" cy="450" rx="200" ry="245" />
      </g>
    </svg>

    <div class="spark spark-1"></div>
    <div class="spark spark-2"></div>
    <div class="spark spark-3"></div>
    <div class="spark spark-4"></div>
    <div class="spark spark-5"></div>

    <div class="brand">
      <div class="brand-name">Olá,<em> Jacy.<br>Bem Vinda!</em></div>
      <p class="brand-tagline">Não é só roupa, é identidade!</p>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="form-box">
      <h1 class="form-title">Entrar</h1>
      <p class="form-subtitle">Acesse o painel administrativo</p>

      <form id="loginForm" novalidate>

        <div class="input-group">
          <label>Usuário</label>
          <input type="text" name="username" placeholder="seu usuário" required>
        </div>

        <div class="input-group">
          <label>Senha</label>

          <div class="input-wrapper">

            <input type="password" name="password" id="passwordField" placeholder="sua senha" required>

            <button type="button" class="eye-btn" id="eyeBtn" aria-label="Mostrar senha">

              <svg class="eye" viewBox="0 0 24 24">

                <!-- olho base -->
                <path class="eye-outline" d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" fill="none"
                  stroke="currentColor" stroke-width="2" />

                <!-- pupila -->
                <circle class="pupil" cx="12" cy="12" r="3" fill="currentColor" />

                <!-- pálpebra (fecha o olho) -->
                <path class="lid" d="M2 12 C6 4, 18 4, 22 12 C18 8, 6 8, 2 12 Z"/>

                <!-- cílios -->
                <path class="lashes" d="M4 10 L1 7 M8 9 L6 5 M12 8 L12 4 M16 9 L18 5 M20 10 L23 7" stroke="currentColor"
                  stroke-width="1.5" opacity="0" />

              </svg>

            </button>

          </div>
        </div>

        <div class="error-msg" id="errorMsg">Usuário ou senha inválidos.</div>

        <button type="submit" class="btn-login" id="loginBtn">
          Entrar
        </button>

      </form>

      <div class="form-footer">
        <strong>Closet da Jacy</strong> • Horbyon
      </div>
    </div>

  </div>

  <script src="login.js"></script>
</body>

</html>
